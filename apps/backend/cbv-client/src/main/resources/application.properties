quarkus.http.port=8080

# URL of the protected API
quarkus.rest-client.cbv-api.url=${CBV_API_URL}

# OIDC Client - client_credentials flow using service account
quarkus.oidc-client.auth-server-url=${OIDC_AUTH_SERVER_URL}
quarkus.oidc-client.client-id=${OIDC_CLIENT_ID}
quarkus.oidc-client.credentials.secret=${OIDC_CLIENT_SECRET}
quarkus.oidc-client.grant.type=client

# OpenShift deployment
quarkus.kubernetes.deployment-target=openshift
quarkus.kubernetes.namespace=rhbk-apps
quarkus.openshift.route.expose=true
quarkus.openshift.build-strategy=binary
quarkus.openshift.base-jvm-image=registry.access.redhat.com/ubi9/openjdk-17:latest
quarkus.container-image.build=true

# Environment variables injected into the runtime container
quarkus.openshift.env.vars."OIDC_AUTH_SERVER_URL"=${OIDC_AUTH_SERVER_URL}
quarkus.openshift.env.vars."OIDC_CLIENT_ID"=${OIDC_CLIENT_ID}
quarkus.openshift.env.vars."OIDC_CLIENT_SECRET"=${OIDC_CLIENT_SECRET}
quarkus.openshift.env.vars."CBV_API_URL"=${CBV_API_URL}

# Health
quarkus.smallrye-health.root-path=/q/health